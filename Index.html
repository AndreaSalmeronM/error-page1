<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />

<body>
  <div class="container-fluid vh-100 d-flex align-items-center">

      <div class="col-md-6 text-center text-md-end">

      </div>
      <div class="col-md-6 text-white text-md-start text-center px-1">

          Nuestro equipo ya está trabajando en ello.
        </p>
        <a href="login.html" class="btn btn-light btn-sm px-4">Volver a la página principal</a>
        <div class="mt-5 small opacity-75">
          SAG © 2026 - Sistema de Administración General <br />
          Gerencia de Recursos Humanos - FGR
        </div>
      </div>
    </div>
